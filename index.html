<html>
  <body style="background-color: black;">
<canvas style="width:100%; height:100%" id="canvas"></canvas>
</body>
<script src="https://unpkg.com/rive-js@0.0.4/dist/rive.js"></script>
<script>
  // autoplays the first animation in the default artboard
  new Rive({
    src: 'https://cdn.rive.app/animations/tv_color.riv',
    canvas: document.getElementById('canvas'),
    autoplay: true,
  })
</script>
</html>
